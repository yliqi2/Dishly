<div
  class="confirm-delete-modal-backdrop"
  role="dialog"
  aria-modal="true"
  aria-labelledby="confirm-delete-title"
  (click)="onBackdropClick()"
  (keydown)="onModalKeydown($event)"
>
  <div #dialogRoot class="confirm-delete-modal-shell" tabindex="-1">
    <div class="confirm-delete-modal-content animate-pop" (click)="$event.stopPropagation()">
      <div class="confirm-delete-modal-header">
        <h2 class="confirm-delete-modal-title" id="confirm-delete-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Delete Account
        </h2>
      </div>

      <div class="confirm-delete-modal-body">
        <p>Are you sure you want to permanently delete your account and all your recipes? This action cannot be undone.</p>
        @if (context.error()) {
          <p class="form-message form-message-error" role="status" aria-live="polite">{{ context.error() }}</p>
        }
      </div>

      <div class="confirm-delete-modal-footer">
        <button type="button" class="btn-secondary" (click)="closeModal.emit()">Cancel</button>
        <button
          type="button"
          class="btn-danger"
          (click)="context.onConfirm()"
          [disabled]="context.isProcessing()"
          [attr.aria-busy]="context.isProcessing()"
        >
          @if (context.isProcessing()) {
            <span class="btn-loading-icon" aria-hidden="true"></span>
          } @else {
            Delete Account
          }
        </button>
      </div>
    </div>
  </div>
</div>
