<div
  class="delete-modal-backdrop"
  role="dialog"
  aria-modal="true"
  aria-labelledby="delete-post-modal-title"
  (click)="cancel()"
>
  <div class="delete-modal-shell" tabindex="-1">
    <div class="delete-modal-content animate-pop" (click)="$event.stopPropagation()">
      <div class="delete-modal-header">
        <h3 class="delete-modal-title" id="delete-post-modal-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Delete post
        </h3>
      </div>

      <div class="delete-modal-body">
        <p>Are you sure you want to delete this forum? All comments will be removed.</p>
      </div>

      <div class="delete-modal__actions">
        <button class="btn-secondary" type="button" (click)="cancel()">Cancel</button>
        <button class="btn-danger" type="button" [disabled]="isProcessing()" (click)="confirm()">
          @if (isProcessing()) {
            <span class="btn-loading-icon" aria-hidden="true"></span>
          } @else {
            <span>Delete</span>
          }
        </button>
      </div>
    </div>
  </div>
</div>
