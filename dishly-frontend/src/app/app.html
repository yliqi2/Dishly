<div class="app-shell">
	@if (isGlobalLoading()) {
		<div class="global-loading-overlay" aria-live="polite" aria-busy="true">
			<div class="global-loading-spinner" aria-hidden="true"></div>
		</div>
	}
	@if (showHeader()) {
		<app-header />
	}
	<main class="app-main">
		<router-outlet />
	</main>
	@if (showHeader()) {
		<app-footer />
	}
</div>
