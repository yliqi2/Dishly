<div class="search-page-container container-fluid py-4 px-lg-5">
  <section class="page-header container-fluid px-0">
    <div class="page-header__inner">
      <h1 class="page-title">Explore Recipes</h1>
      <div class="page-underline" aria-hidden="true"></div>
    </div>
  </section>

  <div class="row mt-4">
    <!-- Sidebar Filters -->
    <aside class="col-lg-3 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold mb-0">Filters</h2>
        <button class="btn btn-link text-highlight p-0 text-decoration-none fw-bold" (click)="clearFilters()">Clear All</button>
      </div>

      <div class="filter-card shadow-sm rounded-4 p-4 bg-white border">
        <!-- Order by -->
        <div class="filter-section mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="filter-dot"></span>
            <label class="fw-bold filter-label">Order by</label>
          </div>
          <select class="form-select border-0 form-select-custom rounded-3 py-2 px-3">
            <option>Most Popular</option>
            <option>Newest</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
          </select>
        </div>

        <!-- Ingredients -->
        <div class="filter-section mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="filter-dot"></span>
            <label class="fw-bold filter-label">Ingredients</label>
          </div>
          
          <div class="dropdown-search-container position-relative mb-3">
            <div class="input-group border rounded-3 overflow-hidden bg-white shadow-sm">
              <input type="text" class="form-control border-0 py-2 px-3" 
                     placeholder="Select ingredient..." 
                     [(ngModel)]="ingredientSearch"
                     (focus)="showIngredientDropdown = true"
                     (blur)="setTimeout(() => showIngredientDropdown = false, 200)">
              <span class="input-group-text bg-transparent border-0 pe-3">
                <lucide-icon name="chevron-down" [size]="16" class="text-muted"></lucide-icon>
              </span>
            </div>
            <div class="dropdown-menu-custom shadow rounded-3 border bg-white position-absolute w-100 mt-1 z-3" 
                 *ngIf="showIngredientDropdown && filteredIngredientsOptions.length > 0">
              <button *ngFor="let option of filteredIngredientsOptions" 
                      class="dropdown-item-custom w-100 text-start px-3 py-2 border-0 bg-transparent small"
                      (click)="addIngredient(option)">
                {{ option }}
              </button>
            </div>
          </div>

          <div class="tag-cloud d-flex flex-wrap gap-2">
            <div *ngFor="let ing of selectedIngredients" class="filter-tag d-flex align-items-center gap-2 px-3 py-1 rounded-pill bg-light border">
              <span>{{ ing }}</span>
              <button class="btn-close small" style="font-size: 0.5rem;" (click)="removeIngredient(ing)"></button>
            </div>
          </div>
        </div>

        <!-- Persons -->
        <div class="filter-section mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="filter-dot"></span>
            <label class="fw-bold filter-label">Persons</label>
          </div>

          <div class="dropdown-search-container position-relative mb-3">
            <div class="input-group border rounded-3 overflow-hidden bg-white shadow-sm">
              <input type="text" class="form-control border-0 py-2 px-3" 
                     placeholder="Select persons..." 
                     [(ngModel)]="personsSearch"
                     (focus)="showPersonsDropdown = true"
                     (blur)="setTimeout(() => showPersonsDropdown = false, 200)">
              <span class="input-group-text bg-transparent border-0 pe-3">
                <lucide-icon name="chevron-down" [size]="16" class="text-muted"></lucide-icon>
              </span>
            </div>
            <div class="dropdown-menu-custom shadow rounded-3 border bg-white position-absolute w-100 mt-1 z-3" 
                 *ngIf="showPersonsDropdown && filteredPersonsOptions.length > 0">
              <button *ngFor="let option of filteredPersonsOptions" 
                      class="dropdown-item-custom w-100 text-start px-3 py-2 border-0 bg-transparent small"
                      (click)="addPerson(option)">
                {{ option }}
              </button>
            </div>
          </div>

          <div class="tag-cloud d-flex flex-wrap gap-2">
            <div *ngFor="let p of selectedPersons" class="filter-tag d-flex align-items-center gap-2 px-3 py-1 rounded-pill bg-light border">
              <span>{{ p }}</span>
              <button class="btn-close small" style="font-size: 0.5rem;" (click)="removePerson(p)"></button>
            </div>
          </div>
        </div>

        <!-- Tags -->
        <div class="filter-section mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="filter-dot"></span>
            <label class="fw-bold filter-label">Tags</label>
          </div>

          <div class="dropdown-search-container position-relative mb-3">
            <div class="input-group border rounded-3 overflow-hidden bg-white shadow-sm">
              <input type="text" class="form-control border-0 py-2 px-3" 
                     placeholder="Select tag..." 
                     [(ngModel)]="tagSearch"
                     (focus)="showTagsDropdown = true"
                     (blur)="setTimeout(() => showTagsDropdown = false, 200)">
              <span class="input-group-text bg-transparent border-0 pe-3">
                <lucide-icon name="chevron-down" [size]="16" class="text-muted"></lucide-icon>
              </span>
            </div>
            <div class="dropdown-menu-custom shadow rounded-3 border bg-white position-absolute w-100 mt-1 z-3" 
                 *ngIf="showTagsDropdown && filteredTagsOptions.length > 0">
              <button *ngFor="let option of filteredTagsOptions" 
                      class="dropdown-item-custom w-100 text-start px-3 py-2 border-0 bg-transparent small"
                      (click)="addTag(option)">
                {{ option }}
              </button>
            </div>
          </div>

          <div class="tag-cloud d-flex flex-wrap gap-2">
            <div *ngFor="let t of selectedTags" class="filter-tag d-flex align-items-center gap-2 px-3 py-1 rounded-pill bg-light border">
              <span>{{ t }}</span>
              <button class="btn-close small" style="font-size: 0.5rem;" (click)="removeTag(t)"></button>
            </div>
          </div>
        </div>

        <!-- Price Range -->
        <div class="filter-section mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="filter-dot"></span>
            <label class="fw-bold filter-label">Price Range</label>
          </div>
          <input type="range" class="form-range custom-range mb-2" [(ngModel)]="priceMax" min="0" max="200">
          <div class="d-flex justify-content-between align-items-center mt-2">
            <div class="price-box px-2 py-1 rounded-2 fw-bold">$0</div>
            <span class="text-muted small">—</span>
            <div class="price-box px-2 py-1 rounded-2 fw-bold">${{ priceMax }}</div>
          </div>
        </div>

        <!-- Minimum Rating -->
        <div class="filter-section">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="filter-dot"></span>
            <label class="fw-bold filter-label">Calificación mínima</label>
          </div>
          <div class="d-flex gap-2">
            <svg 
              *ngFor="let i of [1,2,3,4,5]" 
              viewBox="0 0 24 24" 
              width="24" 
              height="24"
              [attr.fill]="i <= minRating ? '#ffc107' : '#E5E7EB'"
              (click)="setRating(i)"
              class="star-filter"
              style="cursor: pointer;">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Grid -->
    <main class="col-lg-9">
      <div class="row mb-4">
        <div class="col">
          <app-searching-bar (searchQuery)="updateSearch($event)" />
        </div>
      </div>

      <div class="row row-cols-1 row-cols-md-2 g-4" *ngIf="filteredRecipes.length > 0; else noResults">
        <div class="col" *ngFor="let recipe of filteredRecipes">
          <app-recipe-card [recipe]="recipe"></app-recipe-card>
        </div>
      </div>

      <ng-template #noResults>
        <div class="text-center py-5">
          <div class="empty-icon-wrapper mx-auto mb-4 bg-light rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
            <lucide-icon name="search-x" [size]="40" class="text-muted"></lucide-icon>
          </div>
          <h3 class="h4 fw-bold">No recipes found</h3>
          <p class="text-muted">Try adjusting your filters or search query.</p>
          <button class="btn btn-view-recipe px-4 rounded-3 fw-bold mt-2" (click)="searchQuery = ''; clearFilters()">
            Clear All
          </button>
        </div>
      </ng-template>
    </main>
  </div>
</div>
