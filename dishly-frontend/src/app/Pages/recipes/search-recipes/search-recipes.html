<div class="search-page-container container-fluid py-0 px-0">
  <section class="page-header container-fluid px-lg-5 mb-4">
    <div class="page-header__inner">
      <h1 class="page-title">Explore Recipes</h1>
      <div class="page-underline" aria-hidden="true"></div>
    </div>
  </section>

  <div class="container-fluid px-lg-5">
    <div class="row">
      <aside class="col-lg-3 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4 px-2">
          <h2 class="h4 fw-bold mb-0 text-dark">Filters</h2>
          <button class="btn btn-clear-all" (click)="clearFilters()">Clear All</button>
        </div>

        <div class="filter-card shadow-sm border bg-white">
          <div class="filter-section">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="filter-label">Category</label>
            </div>
            <select class="form-select border form-select-custom w-100"
              [value]="selectedCategory()"
              (change)="selectedCategory.set($any($event.target).value)">
              <option value="">All Categories</option>
              <option *ngFor="let cat of categories()" [value]="cat">{{ cat }}</option>
            </select>
          </div>

          <div class="filter-section">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="filter-label">Difficulty</label>
            </div>
            <select class="form-select border form-select-custom w-100"
              [value]="selectedDifficulty()"
              (change)="selectedDifficulty.set($any($event.target).value)">
              <option value="">All Levels</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <!-- Ingredients -->
          <div class="filter-section">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="filter-label">Ingredients</label>
            </div>
            
            <div class="dropdown-search-container position-relative mb-3">
              <div class="input-group border dropdown-input-custom">
                <input type="text" class="form-control border-0 bg-transparent" 
                       placeholder="Select ingredient..." 
                       [value]="ingredientSearch()"
                       (input)="ingredientSearch.set($any($event.target).value)"
                       (focus)="showIngredientDropdown.set(true)"
                       (blur)="closeIngredientDropdown()">
              </div>
              <div class="dropdown-menu-custom shadow rounded-3 border bg-white position-absolute w-100 mt-1 z-3" 
                   *ngIf="showIngredientDropdown() && filteredIngredientsOptions().length > 0">
                <button *ngFor="let option of filteredIngredientsOptions()" 
                        class="dropdown-item-custom w-100 text-start px-3 py-2 border-0 bg-transparent"
                        (mousedown)="addIngredient(option); $event.preventDefault()">
                  {{ option }}
                </button>
              </div>
            </div>

            <div class="tag-cloud d-flex flex-wrap gap-2">
              <div *ngFor="let ing of selectedIngredients()" class="filter-tag d-flex align-items-center gap-2 px-3 py-1 rounded-pill border">
                <span>{{ ing }}</span>
                <button class="btn-close" style="font-size: 0.5rem;" (click)="removeIngredient(ing)"></button>
              </div>
            </div>
          </div>

          <!-- Persons -->
          <div class="filter-section">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="filter-label">Persons</label>
            </div>

            <div class="dropdown-search-container position-relative mb-3">
              <div class="input-group border dropdown-input-custom">
                <input type="text" class="form-control border-0 bg-transparent" 
                       placeholder="Select persons..." 
                       [value]="personsSearch()"
                       (input)="personsSearch.set($any($event.target).value)"
                       (focus)="showPersonsDropdown.set(true)"
                       (blur)="closePersonsDropdown()">
              </div>
              <div class="dropdown-menu-custom shadow rounded-3 border bg-white position-absolute w-100 mt-1 z-3" 
                   *ngIf="showPersonsDropdown() && filteredPersonsOptions().length > 0">
                <button *ngFor="let option of filteredPersonsOptions()" 
                        class="dropdown-item-custom w-100 text-start px-3 py-2 border-0 bg-transparent"
                        (mousedown)="addPerson(option); $event.preventDefault()">
                  {{ option }}
                </button>
              </div>
            </div>

            <div class="tag-cloud d-flex flex-wrap gap-2">
              <div *ngFor="let p of selectedPersons()" class="filter-tag d-flex align-items-center gap-2 px-3 py-1 rounded-pill border">
                <span>{{ p }}</span>
                <button class="btn-close" style="font-size: 0.5rem;" (click)="removePerson(p)"></button>
              </div>
            </div>
          </div>

          <!-- Tags -->
          <div class="filter-section">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="filter-label">Tags</label>
            </div>

            <div class="dropdown-search-container position-relative mb-3">
              <div class="input-group border dropdown-input-custom">
                <input type="text" class="form-control border-0 bg-transparent" 
                       placeholder="Select tag..." 
                       [value]="tagSearch()"
                       (input)="tagSearch.set($any($event.target).value)"
                       (focus)="showTagsDropdown.set(true)"
                       (blur)="closeTagsDropdown()">
              </div>
              <div class="dropdown-menu-custom shadow rounded-3 border bg-white position-absolute w-100 mt-1 z-3" 
                   *ngIf="showTagsDropdown() && filteredTagsOptions().length > 0">
                <button *ngFor="let option of filteredTagsOptions()" 
                        class="dropdown-item-custom w-100 text-start px-3 py-2 border-0 bg-transparent"
                        (mousedown)="addTag(option); $event.preventDefault()">
                  {{ option }}
                </button>
              </div>
            </div>

            <div class="tag-cloud d-flex flex-wrap gap-2">
              <div *ngFor="let t of selectedTags()" class="filter-tag d-flex align-items-center gap-2 px-3 py-1 rounded-pill border">
                <span>{{ t }}</span>
                <button class="btn-close" style="font-size: 0.5rem;" (click)="removeTag(t)"></button>
              </div>
            </div>
          </div>

          <div class="filter-section mb-4">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="fw-bold filter-label">Price Range</label>
            </div>
            <div class="dual-range-container position-relative mb-2">
              <div class="range-track"></div>
              <input type="range" class="range-input min-range"
                [value]="priceMin()"
                (input)="priceMin.set(+$any($event.target).value); validateRange()"
                min="0" max="200" step="1">
              <input type="range" class="range-input max-range"
                [value]="priceMax()"
                (input)="priceMax.set(+$any($event.target).value); validateRange()"
                min="0" max="200" step="1">
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <div class="price-box px-3 py-1 rounded-2 fw-bold">${{ priceMin() }}</div>
              <span class="text-muted small">—</span>
              <div class="price-box px-3 py-1 rounded-2 fw-bold">${{ priceMax() }}</div>
            </div>
          </div>

          <div class="filter-section">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="filter-dot"></span>
              <label class="fw-bold filter-label">Minimum Rating</label>
            </div>
            <div class="d-flex gap-2">
              <svg
                *ngFor="let i of [1,2,3,4,5]"
                viewBox="0 0 24 24"
                width="24"
                height="24"
                [attr.fill]="i <= minRating() ? '#FD8923' : '#E5E7EB'"
                (click)="setRating(i)"
                class="star-filter"
                style="cursor: pointer;">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
            </div>
          </div>
        </div>
      </aside>

      <main class="col-lg-9">
        <div class="mb-4">
          <div class="recipes-search-bar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 21L16.65 16.65M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input
              type="text"
              class="recipes-search-bar__input"
              placeholder="Search recipes, ingredients, or categories..."
              [value]="searchQuery()"
              (input)="searchQuery.set($any($event.target).value)"
            />
          </div>
        </div>

        <div *ngIf="loading()" class="text-center py-5">
          <div class="spinner-border text-warning" role="status"></div>
          <p class="mt-3 text-muted">Loading recipes...</p>
        </div>

        <div *ngIf="error() && !loading()" class="text-center py-5">
          <p class="text-danger fw-bold">Could not load recipes. Please try again.</p>
          <button class="btn btn-view-recipe px-4 rounded-3 fw-bold mt-2" (click)="loadRecipes()">Retry</button>
        </div>

        <div *ngIf="!loading() && !error()">
          <div class="row row-cols-1 row-cols-md-2 g-4" *ngIf="filteredRecipes().length > 0; else noResults">
            <div class="col" *ngFor="let recipe of filteredRecipes()">
              <app-recipe-card [receta]="recipe"></app-recipe-card>
            </div>
          </div>

          <ng-template #noResults>
            <div class="text-center py-5">
              <div class="empty-icon-wrapper mx-auto mb-4 bg-white border rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                <lucide-icon name="search-x" [size]="40" class="text-muted"></lucide-icon>
              </div>
              <h3 class="h4 fw-bold">No recipes found</h3>
              <p class="text-muted">Try adjusting your filters or search query.</p>
              <button class="btn btn-view-recipe px-4 rounded-3 fw-bold mt-2" (click)="clearFilters()">
                Clear All
              </button>
            </div>
          </ng-template>
        </div>
      </main>
    </div>
  </div>
</div>
