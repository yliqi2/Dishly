<div class="recipe-card shadow-sm rounded-4 overflow-hidden bg-white h-100 d-flex flex-column border">
  <!-- Image Container -->
  <div class="recipe-img-container position-relative">
    <img [src]="recipe.image" [alt]="recipe.title" class="recipe-img w-100">
    
    <!-- Badges -->
    <div class="card-badges position-absolute top-0 start-0 p-3 d-flex gap-2">
      <span class="badge-item badge-orange">{{ recipe.badges[0] }}</span>
      <span class="badge-item badge-white">
        <lucide-icon name="chef-hat" [size]="12"></lucide-icon>
        {{ recipe.badges[1] }}
      </span>
    </div>

    <!-- Rating Badge -->
    <div class="card-rating position-absolute top-0 end-0 p-3">
      <div class="rating-box d-flex align-items-center gap-1 bg-white px-2 py-1 rounded-3 shadow-sm">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="#FD8923">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        <span class="small fw-bold text-dark">{{ recipe.rating }}</span>
      </div>
    </div>
  </div>

  <!-- Card Content -->
  <div class="p-4 flex-grow-1 d-flex flex-column">
    <h3 class="h5 fw-bold mb-2 text-dark">{{ recipe.title }}</h3>
    <p class="text-muted small mb-4 line-clamp-2">{{ recipe.description }}</p>
    
    <div class="d-flex align-items-center gap-4 mb-4 mt-auto">
      <div class="d-flex align-items-center gap-2 text-muted small">
        <lucide-icon name="clock" [size]="16" class="text-highlight"></lucide-icon>
        <span class="fw-medium">{{ recipe.time }}</span>
      </div>
      <div class="d-flex align-items-center gap-2 text-muted small">
        <lucide-icon name="flame" [size]="16" class="text-highlight"></lucide-icon>
        <span class="fw-medium">{{ recipe.kcal }}</span>
      </div>
      <div class="ms-auto">
        <span class="fw-bold text-highlight h5 mb-0">{{ recipe.price | number:'1.2-2' }}€</span>
      </div>
    </div>

    <button class="btn btn-view-recipe w-100 rounded-3 py-2 fw-bold" [routerLink]="['/recipes', recipe.id]">
      View Recipe
    </button>
  </div>
</div>
