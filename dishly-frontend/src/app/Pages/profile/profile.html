<main class="profile-main">
  <section class="page-header">
    <div class="page-header__inner">
      <h1 class="page-title">My Profile</h1>
      <div class="page-underline" aria-hidden="true"></div>
    </div>
  </section>

  <div class="profile-wrapper page-container">
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar" aria-hidden="true">
          @if (iconUrl(); as url) {
            <img [src]="url" alt="Profile icon" />
          } @else {
            <span class="profile-avatar-initial">{{ displayName.charAt(0).toUpperCase() }}</span>
          }
        </div>
        <div class="profile-info">
          <h1 id="profile-title" class="profile-name">
            {{ displayName }}
            @if (user()?.chef) {
              <lucide-icon name="chef-hat" class="profile-chef-hat" size="18" strokeWidth="2"></lucide-icon>
            }
          </h1>
          <p class="profile-meta">{{ memberSince }}</p>
          <p class="profile-email">{{ user()?.email ?? '—' }}</p>
          <a routerLink="/profile/edit" class="btn-primary btn-sm profile-edit-link">Edit Profile</a>
        </div>
      </div>

      <section class="profile-stats" aria-label="Profile statistics">
        <div class="profile-stat">
          <lucide-icon name="chef-hat" class="profile-stat-icon" size="24" strokeWidth="2"></lucide-icon>
          <span class="profile-stat-label">My Recipes</span>
          <span class="profile-stat-value">{{ myRecipesCount() }}</span>
        </div>
        <div class="profile-stat">
          <lucide-icon name="shopping-cart" class="profile-stat-icon" size="24" strokeWidth="2"></lucide-icon>
          <span class="profile-stat-label">Bought Recipes</span>
          <span class="profile-stat-value">{{ boughtRecipesCount() }}</span>
        </div>
      </section>

      <button type="button" class="btn-danger btn-full-width profile-logout-btn" [disabled]="isLoggingOut()" (click)="logout()" [attr.aria-busy]="isLoggingOut()">
        @if (isLoggingOut()) {
          <span class="btn-loading-icon" aria-hidden="true"></span>
        } @else {
          <span class="profile-logout-text">Log out</span>
        }
      </button>
    </div>
  </div>
</main>
