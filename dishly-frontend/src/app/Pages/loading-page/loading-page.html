<div class="lp-container">

  <!-- Floating food blobs background -->
  <div class="lp-blob lp-blob-1" aria-hidden="true"></div>
  <div class="lp-blob lp-blob-2" aria-hidden="true"></div>

  <div class="lp-card">

    <!-- Chef illustration -->
    <div class="lp-chef" aria-hidden="true">
      <div class="chef-hat">
        <div class="hat-top"></div>
        <div class="hat-brim"></div>
      </div>
      <div class="chef-face">
        <div class="chef-eyes">
          <span class="eye"></span>
          <span class="eye"></span>
        </div>
        <div class="chef-mouth"></div>
      </div>
      <div class="chef-body">
        <div class="chef-buttons">
          <span></span><span></span><span></span>
        </div>
      </div>
      <!-- Steam / confused swirls -->
      <div class="steam">
        <span class="swirl s1">~</span>
        <span class="swirl s2">~</span>
        <span class="swirl s3">~</span>
      </div>
    </div>

    <!-- Spinner -->
    <div class="lp-spinner mt-4 mb-3">
        <div class="spinner-border text-warning" role="status" style="width: 3rem; height: 3rem; border-width: 0.35em;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Headline -->
    <h1 class="lp-title">Cooking up something delicious...</h1>

    <!-- Subtitle -->
    <p class="lp-subtitle">
      Just a moment while our chef prepares the ingredients. 
      Good things take time!
    </p>

    <!-- Divider -->
    <div class="lp-divider">
      <span>👨‍🍳</span>
    </div>

  </div>

</div>
