<div class="ve-container">
  <div class="ve-card">
    <div class="ve-chef" aria-hidden="true">
      <div class="chef-hat">
        <div class="hat-top"></div>
        <div class="hat-brim"></div>
      </div>
      <div class="chef-face">
        <div class="chef-eyes">
          <span class="eye"></span>
          <span class="eye"></span>
        </div>
        <div class="chef-mouth"></div>
      </div>
      <div class="chef-body">
        <div class="chef-buttons">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="steam">
        <span class="swirl s1">~</span>
        <span class="swirl s2">~</span>
        <span class="swirl s3">~</span>
      </div>

      <div class="ve-status-badge" [class.ve-status-badge--error]="isError()">
        @if (isLoading()) {
          <span class="spinner"></span>
        } @else if (isError()) {
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        } @else {
          <i class="bi bi-check-lg" aria-hidden="true"></i>
        }
      </div>
    </div>

    @if (isLoading()) {
      <h1 class="ve-title">Verifying your email...</h1>
    } @else if (isError()) {
      <h1 class="ve-title">Verification failed</h1>
    } @else {
      <h1 class="ve-title">Email verified</h1>
    }

    <p class="ve-subtitle">{{ message() }}</p>

    <div class="ve-divider">
      @if (isError()) {
        <i class="bi bi-exclamation-triangle-fill ve-divider-icon" aria-hidden="true"></i>
      } @else {
        <i class="bi bi-envelope-fill ve-divider-icon" aria-hidden="true"></i>
      }
    </div>

    <p class="ve-helper">{{ redirectLabel() }}</p>

    @if (!isLoading()) {
      <a
        routerLink="/login"
        [queryParams]="{ verification: verificationStatus() }"
        class="btn-primary ve-button"
      >
        Go to login
      </a>
    }
  </div>
</div>
