services:

  # =====================
  # MYSQL
  # =====================
  mysql:
    image: mysql:latest
    container_name: mysql_app
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - dishly-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =====================
  # LARAVEL
  # =====================
  backend:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: laravel_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./dishly-backend:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:80"
    networks:
      - dishly-network
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:${BACKEND_PORT}
    command: >
      bash -c "
      mkdir -p /var/www/html/storage/logs /var/www/html/storage/framework/cache/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/views /var/www/html/bootstrap/cache &&
      touch /var/www/html/storage/logs/laravel.log &&
      chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
      chmod -R ug+rwx /var/www/html/storage /var/www/html/bootstrap/cache &&
      composer install --no-interaction --optimize-autoloader &&
      [ ! -f /var/www/html/.env ] && cp /var/www/html/.env.example /var/www/html/.env || true &&
      (grep -q '^APP_KEY=base64:' /var/www/html/.env || php artisan key:generate --no-interaction) &&
      php artisan config:clear &&
      php artisan migrate --force &&
      echo 'Server started' &&
      apache2-foreground
      "

  # =====================
  # ANGULAR
  # =====================
  frontend:
    image: node:latest
    container_name: angular_app
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_ALLOWED_HOSTS=servomechanically-nonaffecting-stephanie.ngrok-free.dev
    volumes:
      - ./dishly-frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT}:4200"
    networks:
      - dishly-network
    command: >
      sh -c "
      npm install &&
      npm start -- --host 0.0.0.0 --port 4200 --poll 2000 --proxy-config proxy.conf.json
      "
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    command: start --all --config /etc/ngrok.yml
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    volumes:
      - "./docker/ngrok.yml:/etc/ngrok.yml"
    ports:
      - "4040:4040"
    depends_on:
      - backend
      - frontend
    networks:
      - dishly-network
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - TZ=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
      - ./input:/files #Directorio donde tendremos el archivo PDF
    networks:
      - dishly-network
  ollama:
    image: ollama/ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    gpus: all
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - dishly-network

  ollama-setup:
    image: ollama/ollama
    container_name: ollama_setup
    networks:
      - dishly-network
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull gemma3:1b"

volumes:
  mysql_data:
  ollama_data:
  n8n_data:

networks:
  dishly-network:
    driver: bridge